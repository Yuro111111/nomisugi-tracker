<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二日酔いトラッカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#fff;color:#1a1a1a;padding:1.5rem}
.app{max-width:480px;margin:0 auto}
.screen{display:none}.screen.active{display:block}
.big-btn{width:100%;padding:16px;font-size:15px;font-weight:500;border-radius:12px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#1a1a1a;transition:background 0.1s,transform 0.08s}
.big-btn:active{transform:scale(0.98)}
.big-btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.big-btn.primary:active{opacity:0.85}
.muted{font-size:13px;color:#666}
.label{font-size:11px;color:#666;margin-bottom:4px}
.drink-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.d-btn{padding:14px 8px;font-size:14px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;cursor:pointer;color:#1a1a1a;transition:all 0.12s;text-align:center}
.d-btn:hover{border-color:#aaa;background:#f5f5f5}
.d-btn.flash{background:#E6F1FB;border-color:#85B7EB;color:#0C447C}
.custom-row{display:flex;gap:8px;margin-top:8px}
.custom-row input{flex:1;font-size:14px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;outline:none}
.custom-row input:focus{border-color:#888}
.custom-row button{white-space:nowrap;font-size:13px;padding:8px 14px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer}
.log-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0}
.log-row:last-child{border-bottom:none}
.count-badge{background:#f5f5f5;border-radius:99px;padding:2px 10px;font-size:13px;font-weight:500}
.timer{font-size:22px;font-weight:500;letter-spacing:0.04em}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:8px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.stat-card{background:#f5f5f5;border-radius:8px;padding:1rem}
.stat-val{font-size:22px;font-weight:500}
.bar-wrap{flex:1;background:#f0f0f0;border-radius:4px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.hangover-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.h-btn{padding:16px;font-size:14px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;cursor:pointer;font-weight:500;transition:all 0.1s}
.h-btn:hover{background:#f5f5f5}
.h-btn.ok{background:#E1F5EE;border-color:#5DCAA5;color:#085041}
.h-btn.ng{background:#FCEBEB;border-color:#F09595;color:#A32D2D}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500}
.b-ok{background:#E1F5EE;color:#085041}
.b-ng{background:#FCEBEB;color:#A32D2D}
.b-warn{background:#FAEEDA;color:#633806}
.section-title{font-size:13px;font-weight:500;color:#666;margin:1.25rem 0 8px}
.tabs{display:flex;gap:2px;background:#f0f0f0;border-radius:8px;padding:3px;margin-bottom:1.25rem}
.tab{flex:1;padding:6px;text-align:center;font-size:13px;cursor:pointer;border-radius:6px;color:#666;border:none;background:transparent;transition:all 0.15s}
.tab.active{background:#fff;color:#1a1a1a;font-weight:500;border:1px solid #e0e0e0}
.empty{text-align:center;padding:2.5rem 0;color:#888;font-size:14px}
.del-btn{background:none;border:none;cursor:pointer;font-size:13px;color:#aaa;padding:2px 6px}
.step-label{font-size:11px;color:#888;margin-bottom:12px}
.auto-banner{background:#FAEEDA;border:1px solid #EF9F27;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#633806}
.check-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.check-pill{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid #e0e0e0;border-radius:99px;font-size:13px;cursor:pointer;user-select:none;transition:all 0.12s}
.check-pill input{display:none}
.check-pill.on{background:#E1F5EE;border-color:#5DCAA5;color:#085041}
.alco-pill{display:inline-flex;align-items:center;gap:4px;background:#f0f0f0;border-radius:99px;padding:3px 10px;font-size:12px;color:#555;margin-top:6px}
.goal-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.goal-row input[type=number]{width:60px;font-size:16px;padding:6px 8px;border:1px solid #ddd;border-radius:8px;text-align:center;outline:none}
.goal-bar-wrap{flex:1;background:#f0f0f0;border-radius:4px;height:10px;overflow:hidden}
.goal-bar{height:100%;border-radius:4px;transition:width 0.3s}
.ai-card{background:#f7f7f7;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;margin-top:1rem;font-size:13px;color:#555;line-height:1.7}
.ai-card .ai-label{font-size:11px;font-weight:500;color:#999;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em}
.ai-loading{display:flex;align-items:center;gap:8px;font-size:13px;color:#999}
.dot-flashing{display:inline-flex;gap:4px}
.dot-flashing span{width:5px;height:5px;border-radius:50%;background:#ccc;animation:dotpulse 1.2s infinite}
.dot-flashing span:nth-child(2){animation-delay:.2s}
.dot-flashing span:nth-child(3){animation-delay:.4s}
@keyframes dotpulse{0%,80%,100%{opacity:.2}40%{opacity:1}}
.month-chart{margin:1rem 0}
.month-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.month-label{width:36px;color:#888;text-align:right}
.month-bar-outer{flex:1;background:#f0f0f0;border-radius:4px;height:16px;overflow:hidden;position:relative}
.month-bar-inner{height:100%;border-radius:4px;background:#1a1a1a;transition:width 0.4s}
.month-bar-val{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:11px;color:#888}
.export-btn{font-size:12px;padding:6px 12px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;color:#555;margin-top:8px}
.export-btn:hover{background:#f5f5f5}
.warning-banner{background:#FCEBEB;border:1px solid #F09595;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:13px;color:#A32D2D}
</style>
</head>
<body>
<div class="app">

<div id="s-home" class="screen active">
  <div id="pending-notice" style="display:none;margin-bottom:1rem"></div>
  <div class="tabs">
    <button class="tab active" onclick="homeTab('start')">今夜記録</button>
    <button class="tab" onclick="homeTab('history')">履歴</button>
    <button class="tab" onclick="homeTab('analysis')">分析</button>
  </div>
  <div id="ht-start">
    <button class="big-btn primary" onclick="startSession()">飲み会をはじめる</button>
    <p class="muted" style="text-align:center;margin-top:10px">ボタンを押してから飲み始めてください</p>
  </div>
  <div id="ht-history" style="display:none"><div id="history-list"></div></div>
  <div id="ht-analysis" style="display:none"><div id="analysis-content"></div></div>
</div>

<div id="s-drinking" class="screen">
  <div id="auto-end-banner" style="display:none" class="auto-banner">最後の記録から5時間経過したため自動終了しました</div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <div><div class="label">飲み始めてから</div><div class="timer" id="elapsed">00:00</div></div>
    <div style="text-align:right"><div class="label">合計</div><div class="timer" id="total-cups">0杯</div></div>
  </div>
  <div id="alco-display" style="display:none;margin-bottom:12px"></div>
  <div id="drinking-warning" style="display:none" class="warning-banner"></div>
  <div class="section-title">何を飲んだ？（タップで記録）</div>
  <div class="drink-grid">
    <button class="d-btn" onclick="addDrink('ビール')">ビール</button>
    <button class="d-btn" onclick="addDrink('ハイボール')">ハイボール</button>
    <button class="d-btn" onclick="addDrink('日本酒')">日本酒</button>
    <button class="d-btn" onclick="addDrink('ワイン')">ワイン</button>
    <button class="d-btn" onclick="addDrink('チューハイ')">チューハイ</button>
    <button class="d-btn" onclick="addDrink('焼酎')">焼酎</button>
    <button class="d-btn" onclick="addDrink('カクテル')">カクテル</button>
    <button class="d-btn" onclick="addDrink('梅酒')">梅酒</button>
    <button class="d-btn" onclick="addDrink('テキーラ')">テキーラ</button>
  </div>
  <div class="custom-row">
    <input type="text" id="custom-drink" placeholder="その他のお酒を入力...">
    <button onclick="addCustomDrink()">追加</button>
  </div>
  <div class="section-title" style="margin-top:1rem">食事・水分（任意）</div>
  <div class="check-row">
    <label class="check-pill" id="pill-food" onclick="toggleExtra('food')">
      <span>食事あり</span>
    </label>
    <label class="check-pill" id="pill-water" onclick="toggleExtra('water')">
      <span>水を飲んだ</span>
    </label>
    <label class="check-pill" id="pill-snack" onclick="toggleExtra('snack')">
      <span>おつまみあり</span>
    </label>
  </div>
  <div id="drink-log" style="margin-top:1rem"></div>
  <div style="margin-top:1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <button class="big-btn" onclick="cancelSession()">キャンセル</button>
    <button class="big-btn primary" onclick="goToHangoverStep()">飲み終わり</button>
  </div>
</div>

<div id="s-review" class="screen">
  <div class="step-label" id="review-step-label">ステップ 1 / 2</div>
  <div id="step-hangover">
    <div style="font-size:16px;font-weight:500;margin-bottom:4px">昨夜の飲み会、どうでした？</div>
    <div class="muted" id="hov-summary" style="margin-bottom:4px"></div>
    <div class="section-title">翌朝の体の状態は？</div>
    <div class="hangover-grid">
      <button class="h-btn ok" onclick="setHangover(0)">問題なし</button>
      <button class="h-btn ok" onclick="setHangover(1)">少しだるい</button>
      <button class="h-btn ng" onclick="setHangover(2)">頭が痛い</button>
      <button class="h-btn ng" onclick="setHangover(3)">最悪だった</button>
    </div>
  </div>
  <div id="step-memory" style="display:none">
    <div style="font-size:16px;font-weight:500;margin-bottom:4px">記憶はありますか？</div>
    <div class="muted" style="margin-bottom:4px">昨夜のことをどれくらい覚えていますか？</div>
    <div class="hangover-grid" style="margin-top:12px">
      <button class="h-btn ok" onclick="setMemory(0)">全部覚えてる</button>
      <button class="h-btn ok" onclick="setMemory(1)">ところどころ</button>
      <button class="h-btn ng" onclick="setMemory(2)">かなり曖昧</button>
      <button class="h-btn ng" onclick="setMemory(3)">ほぼ覚えてない</button>
    </div>
  </div>
  <button class="big-btn" onclick="skipReview()" style="margin-top:8px">あとで記録する</button>
</div>

</div>
<script>
const DRINKS_KEY='hov4_records';
const SESSION_KEY='hov4_session';
const GOAL_KEY='hov4_goal';
const AUTO_TIMEOUT=5*60*60*1000;

// アルコール量(g/杯) 概算
const ALCO_MAP={
  'ビール':20,'ハイボール':14,'日本酒':22,'ワイン':18,
  'チューハイ':14,'焼酎':20,'カクテル':10,'梅酒':12,'テキーラ':20
};
const DEFAULT_ALCO=15;
const WARN_ALCO=40; // 40g超で注意
const HIGH_ALCO=60; // 60g超で強警告

let timerInterval=null;
let autoCheckInterval=null;
let session=null;
let pendingHangover=-1;

function load(){try{return JSON.parse(localStorage.getItem(DRINKS_KEY)||'[]')}catch{return[]}}
function save(r){try{localStorage.setItem(DRINKS_KEY,JSON.stringify(r))}catch{}}
function loadSession(){try{const s=localStorage.getItem(SESSION_KEY);return s?JSON.parse(s):null}catch{return null}}
function saveSession(s){try{localStorage.setItem(SESSION_KEY,s?JSON.stringify(s):null)}catch{}}
function loadGoal(){try{return parseInt(localStorage.getItem(GOAL_KEY)||'0')||0}catch{return 0}}
function saveGoal(v){try{localStorage.setItem(GOAL_KEY,v)}catch{}}

function calcAlco(drinkLog){
  return drinkLog.reduce((sum,d)=>sum+(ALCO_MAP[d.name]||DEFAULT_ALCO),0);
}

function init(){
  session=loadSession();
  if(!session){showScreen('s-home');return;}
  if(session.phase==='drinking'){
    const lastActivity=session.drinkLog.length?new Date(session.drinkLog[session.drinkLog.length-1].time).getTime():new Date(session.startTime).getTime();
    if(Date.now()-lastActivity>=AUTO_TIMEOUT){
      session.phase='hangover';session.endTime=new Date(lastActivity+AUTO_TIMEOUT).toISOString();session.autoEnded=true;
      saveSession(session);showPendingNotice();showScreen('s-home');
    } else {
      showScreen('s-drinking');startTimer();startAutoCheck();renderDrinkLog();renderExtraChecks();
    }
  } else if(session.phase==='hangover'){
    showPendingNotice();showScreen('s-home');
  }
}

function showPendingNotice(){
  const el=document.getElementById('pending-notice');
  if(!session||session.phase!=='hangover'){el.style.display='none';return;}
  el.style.display='block';
  const auto=session.autoEnded?'（自動終了）':'';
  el.innerHTML=`<div class="card" style="border-color:#85B7EB">
    <div style="font-size:13px;font-weight:500;color:#0C447C;margin-bottom:4px">昨夜の記録が未完了です ${auto}</div>
    <div class="muted" style="margin-bottom:10px">${session.date} — ${totalCups()}杯</div>
    <button class="big-btn" onclick="openReviewFromHome()" style="font-size:13px;padding:10px">翌朝の状態を記録する</button>
  </div>`;
}

function totalCups(){
  const c={};(session?.drinkLog||[]).forEach(d=>{c[d.name]=(c[d.name]||0)+1;});
  return Object.values(c).reduce((a,b)=>a+b,0);
}

function openReviewFromHome(){
  homeTab('start');
  showScreen('s-review');
  document.getElementById('step-hangover').style.display='block';
  document.getElementById('step-memory').style.display='none';
  document.getElementById('review-step-label').textContent='ステップ 1 / 2';
  pendingHangover=-1;
  const counts={};(session.drinkLog||[]).forEach(d=>{counts[d.name]=(counts[d.name]||0)+1;});
  const alco=calcAlco(session.drinkLog||[]);
  document.getElementById('hov-summary').textContent=session.date+' — '+Object.entries(counts).map(([n,c])=>`${n} ${c}杯`).join('、')+` / 純アルコール約${alco}g`;
}

function homeTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['start','history','analysis'][i]===t));
  ['ht-start','ht-history','ht-analysis'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('ht-'+t).style.display='block';
  if(t==='history')renderHistory();
  if(t==='analysis')renderAnalysis();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startSession(){
  const now=new Date();
  session={phase:'drinking',startTime:now.toISOString(),date:now.toLocaleDateString('ja-JP'),drinks:[],drinkLog:[],extras:{food:false,water:false,snack:false},autoEnded:false};
  saveSession(session);
  showScreen('s-drinking');
  document.getElementById('auto-end-banner').style.display='none';
  startTimer();startAutoCheck();renderDrinkLog();renderExtraChecks();
}

function startTimer(){
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(!session)return;
    const elapsed=Math.floor((Date.now()-new Date(session.startTime).getTime())/1000);
    const h=Math.floor(elapsed/3600),m=Math.floor((elapsed%3600)/60),s=elapsed%60;
    document.getElementById('elapsed').textContent=h>0?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },1000);
}

function startAutoCheck(){
  if(autoCheckInterval)clearInterval(autoCheckInterval);
  autoCheckInterval=setInterval(()=>{
    if(!session||session.phase!=='drinking')return;
    const lastActivity=session.drinkLog.length?new Date(session.drinkLog[session.drinkLog.length-1].time).getTime():new Date(session.startTime).getTime();
    if(Date.now()-lastActivity>=AUTO_TIMEOUT){
      clearInterval(timerInterval);clearInterval(autoCheckInterval);
      session.phase='hangover';session.endTime=new Date(lastActivity+AUTO_TIMEOUT).toISOString();session.autoEnded=true;
      saveSession(session);
      document.getElementById('auto-end-banner').style.display='block';
      goToHangoverStep();
    }
  },60000);
}

function toggleExtra(key){
  if(!session)return;
  if(!session.extras)session.extras={food:false,water:false,snack:false};
  session.extras[key]=!session.extras[key];
  saveSession(session);
  renderExtraChecks();
}

function renderExtraChecks(){
  if(!session)return;
  const ex=session.extras||{};
  ['food','water','snack'].forEach(k=>{
    const el=document.getElementById('pill-'+k);
    if(el)el.classList.toggle('on',!!ex[k]);
  });
}

function addDrink(name){
  if(!session)return;
  session.drinkLog.push({name,time:new Date().toISOString()});
  if(!session.drinks.includes(name))session.drinks.push(name);
  saveSession(session);
  renderDrinkLog();
  document.querySelectorAll('.d-btn').forEach(b=>{
    if(b.textContent===name){b.classList.add('flash');setTimeout(()=>b.classList.remove('flash'),350);}
  });
}

function addCustomDrink(){
  const inp=document.getElementById('custom-drink');
  const v=inp.value.trim();if(!v)return;
  addDrink(v);inp.value='';
}

function renderDrinkLog(){
  if(!session)return;
  const counts={};(session.drinkLog||[]).forEach(d=>{counts[d.name]=(counts[d.name]||0)+1;});
  const el=document.getElementById('drink-log');
  const total=Object.values(counts).reduce((a,b)=>a+b,0);
  document.getElementById('total-cups').textContent=total+'杯';
  const alco=calcAlco(session.drinkLog||[]);
  const alcoEl=document.getElementById('alco-display');
  const warnEl=document.getElementById('drinking-warning');
  if(alco>0){
    alcoEl.style.display='block';
    alcoEl.innerHTML=`<span class="alco-pill">純アルコール 約${alco}g</span>`;
    if(alco>=HIGH_ALCO){
      warnEl.style.display='block';
      warnEl.textContent=`アルコール量がかなり多くなっています（約${alco}g）。水を飲んで休憩しましょう。`;
    } else if(alco>=WARN_ALCO){
      warnEl.style.display='block';
      warnEl.textContent=`そろそろペースを落としてみましょう（純アルコール約${alco}g）。`;
    } else {
      warnEl.style.display='none';
    }
  } else {
    alcoEl.style.display='none';
    warnEl.style.display='none';
  }
  if(!Object.keys(counts).length){el.innerHTML='<div class="muted" style="text-align:center;padding:1rem">まだ記録がありません</div>';return;}
  el.innerHTML=Object.entries(counts).map(([name,cnt])=>`<div class="log-row"><span style="font-size:14px">${name}</span><span class="count-badge">${cnt}杯</span></div>`).join('');
}

function goToHangoverStep(){
  if(!session||!session.drinkLog.length){alert('お酒を記録してください');return;}
  if(session.phase==='drinking'){
    clearInterval(timerInterval);clearInterval(autoCheckInterval);
    session.phase='hangover';session.endTime=new Date().toISOString();
    saveSession(session);
  }
  openReviewFromHome();
  showScreen('s-review');
}

function setHangover(level){
  pendingHangover=level;
  document.getElementById('step-hangover').style.display='none';
  document.getElementById('step-memory').style.display='block';
  document.getElementById('review-step-label').textContent='ステップ 2 / 2';
}

function setMemory(level){
  finalizeRecord(pendingHangover,level);
}

function finalizeRecord(hangover,memory){
  const counts={};(session.drinkLog||[]).forEach(d=>{counts[d.name]=(counts[d.name]||0)+1;});
  const alco=calcAlco(session.drinkLog||[]);
  const rec={
    id:Date.now(),date:session.date,startTime:session.startTime,endTime:session.endTime,
    autoEnded:session.autoEnded||false,drinkCounts:counts,alco,
    extras:session.extras||{},hangover,memory
  };
  const records=load();records.unshift(rec);save(records);
  session=null;saveSession(null);
  showScreen('s-home');homeTab('history');
}

function skipReview(){
  showScreen('s-home');showPendingNotice();
}

function cancelSession(){
  if(!confirm('記録をキャンセルしますか？'))return;
  clearInterval(timerInterval);clearInterval(autoCheckInterval);
  session=null;saveSession(null);showScreen('s-home');
}

function renderHistory(){
  const records=load();
  const el=document.getElementById('history-list');
  if(!records.length){el.innerHTML='<div class="empty">まだ記録がありません</div>';return;}
  const HLABELS=['問題なし','少しだるい','頭が痛い','最悪'];
  const MLABELS=['全部覚えてる','ところどころ','かなり曖昧','ほぼ覚えてない'];
  let html='';
  html+=`<div style="display:flex;justify-content:flex-end;margin-bottom:8px">
    <button class="export-btn" onclick="exportData()">JSONでエクスポート</button>
  </div>`;
  html+=records.map(r=>{
    const drinks=Object.entries(r.drinkCounts).map(([n,c])=>`${n}${c}杯`).join('・');
    const hcls=r.hangover>=2?'b-ng':'b-ok';
    const mcls=r.memory>=2?'b-warn':'b-ok';
    const auto=r.autoEnded?'<span class="badge" style="background:#f0f0f0;color:#888;margin-left:4px">自動終了</span>':'';
    const alcoStr=r.alco?`<span class="alco-pill">🧪 ${r.alco}g</span>`:'';
    const extrasArr=[];
    if(r.extras?.food)extrasArr.push('食事');
    if(r.extras?.water)extrasArr.push('水分補給');
    if(r.extras?.snack)extrasArr.push('おつまみ');
    const extrasStr=extrasArr.length?`<span style="font-size:12px;color:#888;margin-left:6px">${extrasArr.join('・')}</span>`:'';
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <span style="font-size:13px;color:#888">${r.date}</span>${auto}
          <div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
            <span class="badge ${hcls}">${HLABELS[r.hangover]}</span>
            <span class="badge ${mcls}">${MLABELS[r.memory]}</span>
            ${alcoStr}${extrasStr}
          </div>
        </div>
        <button class="del-btn" onclick="deleteRecord(${r.id})">削除</button>
      </div>
      <div style="font-size:13px;color:#888;margin-top:6px">${drinks}</div>
    </div>`;
  }).join('');
  el.innerHTML=html;
}

function exportData(){
  const records=load();
  const blob=new Blob([JSON.stringify(records,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='hangover-tracker.json';a.click();
  URL.revokeObjectURL(url);
}

function deleteRecord(id){
  if(!confirm('削除しますか？'))return;
  save(load().filter(r=>r.id!==id));renderHistory();
}

function getMonthKey(dateStr){
  // dateStr like "2025/6/15" or "2025年6月15日"
  const d=new Date(dateStr.replace(/年|月/g,'/').replace('日',''));
  if(isNaN(d))return '';
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;
}

function renderAnalysis(){
  const records=load();
  const el=document.getElementById('analysis-content');
  if(!records.length){el.innerHTML='<div class="empty">記録が増えると分析できます</div>';return;}
  const total=records.length;
  const badH=records.filter(r=>r.hangover>=2).length;
  const badM=records.filter(r=>r.memory>=2).length;
  const rateH=Math.round(badH/total*100);
  const rateM=Math.round(badM/total*100);
  const avgAlco=records.filter(r=>r.alco).length?Math.round(records.filter(r=>r.alco).reduce((s,r)=>s+r.alco,0)/records.filter(r=>r.alco).length):0;
  const drinkMap={};
  records.forEach(r=>{
    Object.entries(r.drinkCounts).forEach(([name,cnt])=>{
      if(!drinkMap[name])drinkMap[name]={total:0,hangover:0,memory:0};
      drinkMap[name].total++;
      if(r.hangover>=2)drinkMap[name].hangover++;
      if(r.memory>=2)drinkMap[name].memory++;
    });
  });
  const sortedH=Object.entries(drinkMap).filter(([,v])=>v.total>=2).sort(([,a],[,b])=>(b.hangover/b.total)-(a.hangover/a.total));
  const sortedM=Object.entries(drinkMap).filter(([,v])=>v.total>=2).sort(([,a],[,b])=>(b.memory/b.total)-(a.memory/a.total));
  const topRisky=sortedH.find(([,v])=>v.hangover/v.total>=0.5);
  const topMemory=sortedM.find(([,v])=>v.memory/v.total>=0.5);

  // 月別集計
  const monthMap={};
  records.forEach(r=>{
    const mk=getMonthKey(r.date);
    if(!mk)return;
    if(!monthMap[mk])monthMap[mk]=0;
    monthMap[mk]++;
  });
  const months=Object.keys(monthMap).sort().slice(-6);
  const maxMonth=Math.max(...months.map(m=>monthMap[m]),1);

  // 目標設定
  const goal=loadGoal();
  const thisMonth=new Date().toISOString().slice(0,7).replace('-','/');
  const thisMonthCount=monthMap[thisMonth]||0;
  const goalPct=goal?Math.min(100,Math.round(thisMonthCount/goal*100)):0;
  const goalColor=goalPct>=100?'#E24B4A':goalPct>=70?'#EF9F27':'#1D9E75';

  let html=`<div class="stat-grid">
    <div class="stat-card"><div class="label">記録数</div><div class="stat-val">${total}</div></div>
    <div class="stat-card"><div class="label">二日酔い率</div><div class="stat-val">${rateH}%</div></div>
    <div class="stat-card"><div class="label">平均アルコール</div><div class="stat-val">${avgAlco?avgAlco+'g':'—'}</div></div>
  </div>`;

  // 目標設定
  html+=`<div class="section-title">今月の目標（飲み会の回数上限）</div>
  <div class="goal-row">
    <input type="number" id="goal-input" min="0" max="99" value="${goal||''}" placeholder="—" oninput="updateGoal(this.value)">
    <span class="muted">回/月まで</span>
    <div class="goal-bar-wrap"><div class="goal-bar" id="goal-bar" style="width:${goalPct}%;background:${goalColor}"></div></div>
    <span class="muted" style="white-space:nowrap">${goal?thisMonthCount+'/'+goal+'回':'未設定'}</span>
  </div>`;

  // 月別グラフ
  if(months.length){
    html+=`<div class="section-title">月別 飲み会回数</div><div class="month-chart">`;
    months.forEach(m=>{
      const cnt=monthMap[m];
      const pct=Math.round(cnt/maxMonth*100);
      const label=m.replace(/\d{4}\//,'');
      html+=`<div class="month-bar-row">
        <div class="month-label">${label}</div>
        <div class="month-bar-outer"><div class="month-bar-inner" style="width:${pct}%"></div><span class="month-bar-val">${cnt}</span></div>
      </div>`;
    });
    html+=`</div>`;
  }

  // お酒別分析
  if(sortedH.length){
    html+=`<div class="section-title">二日酔いになりやすいお酒</div>`;
    sortedH.forEach(([name,v])=>{
      const pct=Math.round(v.hangover/v.total*100);
      html+=drinkBarHtml(name,pct,pct>=50?'#E24B4A':'#1D9E75');
    });
  }
  if(sortedM.length){
    html+=`<div class="section-title" style="margin-top:1.5rem">記憶をなくしやすいお酒</div>`;
    sortedM.forEach(([name,v])=>{
      const pct=Math.round(v.memory/v.total*100);
      html+=drinkBarHtml(name,pct,pct>=50?'#BA7517':'#1D9E75');
    });
  }

  // AI分析ボタン
  html+=`<div class="section-title" style="margin-top:1.5rem">AIからのアドバイス</div>
  <div id="ai-advice-area">
    <button class="big-btn" onclick="getAIAdvice()" id="ai-btn">データを分析してアドバイスをもらう</button>
  </div>`;

  el.innerHTML=html;
}

function updateGoal(val){
  const v=parseInt(val)||0;
  saveGoal(v);
  // ゴールバーを即時更新
  const records=load();
  const thisMonth=new Date().toISOString().slice(0,7).replace('-','/');
  const monthMap={};
  records.forEach(r=>{const mk=getMonthKey(r.date);if(mk)monthMap[mk]=(monthMap[mk]||0)+1;});
  const cnt=monthMap[thisMonth]||0;
  const pct=v?Math.min(100,Math.round(cnt/v*100)):0;
  const color=pct>=100?'#E24B4A':pct>=70?'#EF9F27':'#1D9E75';
  const bar=document.getElementById('goal-bar');
  if(bar){bar.style.width=pct+'%';bar.style.background=color;}
  const el=document.getElementById('goal-input');
  if(el&&el.nextElementSibling&&el.nextElementSibling.nextElementSibling&&el.nextElementSibling.nextElementSibling.nextElementSibling){
    el.nextElementSibling.nextElementSibling.nextElementSibling.textContent=v?cnt+'/'+v+'回':'未設定';
  }
}

function drinkBarHtml(name,pct,color){
  return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px">
    <div style="width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <div style="width:36px;text-align:right;color:#888">${pct}%</div>
  </div>`;
}

async function getAIAdvice(){
  const records=load();
  if(!records.length)return;
  const btn=document.getElementById('ai-btn');
  const area=document.getElementById('ai-advice-area');
  area.innerHTML=`<div class="ai-loading"><div class="dot-flashing"><span></span><span></span><span></span></div>分析中...</div>`;

  const total=records.length;
  const badH=records.filter(r=>r.hangover>=2).length;
  const badM=records.filter(r=>r.memory>=2).length;
  const avgAlco=records.filter(r=>r.alco).length?Math.round(records.filter(r=>r.alco).reduce((s,r)=>s+r.alco,0)/records.filter(r=>r.alco).length):0;
  const drinkMap={};
  records.forEach(r=>{Object.entries(r.drinkCounts).forEach(([name])=>{drinkMap[name]=(drinkMap[name]||0)+1;});});
  const topDrinks=Object.entries(drinkMap).sort(([,a],[,b])=>b-a).slice(0,3).map(([n])=>n).join('・');
  const waterCount=records.filter(r=>r.extras?.water).length;
  const foodCount=records.filter(r=>r.extras?.food).length;
  const waterRatio=total?Math.round(waterCount/total*100):0;
  const foodRatio=total?Math.round(foodCount/total*100):0;

  const prompt=`あなたは飲み会の健康アドバイザーです。以下のデータをもとに、ユーザーへの具体的なアドバイスを日本語で3〜4文で書いてください。フレンドリーで簡潔に。

【データ】
- 記録回数: ${total}回
- 二日酔い率: ${Math.round(badH/total*100)}%
- 記憶喪失率: ${Math.round(badM/total*100)}%
- 平均アルコール量: ${avgAlco}g/回
- よく飲むお酒: ${topDrinks||'不明'}
- 水分補給率: ${waterRatio}%
- 食事あり率: ${foodRatio}%

アドバイスは「〇〇さんのデータを見ると、」から始めないでください。データの数字は必要に応じて引用してください。`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    const text=data?.content?.[0]?.text||'アドバイスを取得できませんでした。';
    area.innerHTML=`<div class="ai-card"><div class="ai-label">AIアドバイス</div>${text.split('\n').filter(Boolean).map(l=>`<p style="margin-bottom:6px">${l}</p>`).join('')}<div style="text-align:right;margin-top:8px"><button class="export-btn" onclick="getAIAdvice()">再分析</button></div></div>`;
  }catch(e){
    area.innerHTML=`<div class="muted" style="padding:1rem;text-align:center">アドバイスの取得に失敗しました</div><button class="big-btn" onclick="getAIAdvice()" id="ai-btn">再試行</button>`;
  }
}

init();
</script>
</body>
</html>
